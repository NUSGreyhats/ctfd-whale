{% extends "challenge.html" %}

{% block description %}
{{ challenge.html }}
    <div class="row text-center pb-3">
        <div id="whale-panel" style="width: 100%;">
            <div id="whale-panel-stopped" class="card" style="width: 100%;">
                <div class="card-body d-flex flex-column align-items-center justify-content-center"
                     style="gap: 1rem; padding-top: 1.5rem; padding-bottom: 1.5rem;">
                    <h5 class="card-title mb-0">Instance Info</h5>
                    <button class="btn btn-primary" id="whale-button-boot" type="button"
                            style="min-width: 18rem; max-width: 100%;"
                            onclick="CTFd._internal.challenge.boot()">Launch an instance</button>
                </div>
            </div>
            <div id="whale-panel-started" class="card" style="width: 100%; display: none;">
                <div class="card-body d-flex flex-column align-items-center"
                     style="gap: 1rem; padding-top: 1.5rem; padding-bottom: 1.5rem;">
                    <h5 class="card-title mb-0">Instance Info</h5>
                    <div class="text-muted" style="font-size: 1.2rem;">
                        Remaining Time: <span id="whale-challenge-count-down"></span>s
                    </div>
                    <p class="card-text text-muted mb-0" style="max-width: 34rem;">
                        Instance deployed. The challenge may take up to 30 seconds to start.
                    </p>
                    <div id="whale-challenge-ready-controls">
                        <p id="whale-challenge-user-access" class="card-text mb-0"></p>
                        <div class="d-flex flex-column align-items-center" style="gap: 0.75rem; margin-top: 1rem;">
                            <button type="button" class="btn btn-success" id="whale-button-renew"
                                    style="min-width: 18rem; max-width: 100%;"
                                    onclick="CTFd._internal.challenge.renew()">
                                Renew this instance
                            </button>
                            <button type="button" class="btn btn-danger" id="whale-button-destroy"
                                    style="min-width: 18rem; max-width: 100%;"
                                    onclick="CTFd._internal.challenge.destroy()">
                                Destroy this instance
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
